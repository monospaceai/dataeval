# Fast checks only. Type-checking and the full test suite run in CI.
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.7
    hooks:
      - id: uv-lock

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.21
    hooks:
      - id: validate-pyproject

# No `ty` pre-commit hook yet (2026-05). Typecheck runs in CI via `uv run --all-extras ty check`
# (--all-extras so optional adapter drivers — psycopg, etc. — are present to resolve imports).
