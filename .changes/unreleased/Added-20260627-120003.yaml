body: 'load_spider() and load_bird(): turn the Spider and BIRD benchmark datasets into runnable eval cases. Run a model over them with run_benchmark(...) or the `evaldata bench <spider|bird>` CLI to get an execution-accuracy number. Use SCHEMA_PROMPT_TEMPLATE to put the database schema in the prompt.'
